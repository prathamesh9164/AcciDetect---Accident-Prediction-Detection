version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: accidetect_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: accidetect_backend
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
    volumes:
      - media_volume:/app/media
    depends_on:
      - redis
    restart: unless-stopped

  celery:
    build:
      context: ./backend
    container_name: accidetect_celery
    command: celery -A accident_detection worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
    volumes:
      - media_volume:/app/media
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: accidetect_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  media_volume:
